name: Generate Resume PDF

on:
  push:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build PDF from Markdown
        uses: baileyjm02/markdown-to-pdf@v1
        with:
          input_path: resume.md
          output_dir: docs/
          build_html: true
          print_options: '{"displayHeaderFooter": false, "printBackground": true}'

      - name: Prepare docs for GitHub Pages
        run: |
          if [ -f "docs/resume.html" ]; then
            mv docs/resume.html docs/index.html
          fi
          echo "resume.hbautista.com" > docs/CNAME

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: resume.pdf
          path: docs/resume.pdf

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
