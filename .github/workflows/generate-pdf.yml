name: Generate Resume PDF
on:
  push:
    branches: [ main ]

# Give the token write permissions so it can push the compiled PDF back to your repo
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build PDF from Markdown
        uses: baileyjm02/markdown-to-pdf@v1
        with:
          input_path: resume.md
          output_dir: docs/
          build_html: true
          print_options: '{"displayHeaderFooter": false, "printBackground": true}'

      # New step: Rename resume.html to index.html
      name: Prepare docs for Github Pages
      run: |
        if [ -f "docs/resume.html" ] ; then
          mv docs/resume.html docs/index.html
          echo "Renamed resume.html to index.html"
        fi
        echo "resume.hbautista.com" > docs/CNAME
        echo "CNAME file created/verified"

      - name: Debug - List generated files
        run: |
          echo "=== workspace root ==="
          ls -la | grep resume || true
          echo "=== docs/ contents ==="
          ls -la docs/
          echo "=== git status ==="
          git status

      # New Step: Commit the generated PDF back into your main branch
      - name: Commit and Push PDF
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto-generate updated resume PDF and index.html [skip ci]"
            git push origin main
          else
            echo "No changes to commit"
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: resume.pdf
          path: docs/resume.pdf