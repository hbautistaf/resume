name: Generate Resume PDF
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build PDF from Markdown
        uses: baileyjm02/markdown-to-pdf@v1
        with:
          input_path: resume.md
          output_dir: docs
          # Force a clean HTML build to render custom CSS properly
          build_html: true
          # Chromium print options to completely strip headers and footers
          print_options: '{"displayHeaderFooter": false, "printBackground": true}'

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: resume-pdf
          path: docs/resume.pdf