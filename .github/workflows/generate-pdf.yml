name: Generate Resume PDF
on:
  push:
    branches: [ main ]

# Give the token write permissions so it can push the compiled PDF back to your repo
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build PDF from Markdown
        uses: baileyjm02/markdown-to-pdf@v1
        with:
          input_path: resume-hbautista.md
          output_dir: docs
          build_html: true
          print_options: '{"displayHeaderFooter": false, "printBackground": true}'

      - name: Debug - List generated files
        run: |
          echo "=== docs/ contents ==="
          ls -la docs/
          echo "=== git status ==="
          git status

      # New Step: Commit the generated PDF back into your main branch
      - name: Commit and Push PDF
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/
          # Only commit if changes actually exist to prevent empty commit errors
          git diff-index --quiet HEAD || git commit -m "chore: auto-generate updated resume PDF [skip ci]"
          git push origin main

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: resume-pdf
          path: docs/resume-hbautista.pdf